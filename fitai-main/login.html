<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FitAI – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0e8f8;--card:#e0d4f0;--purple:#3d1f7a;--purple2:#6b4bbd;--light:#c5b3ee;--muted:#8e7dbf;--text:#1e0f40;--white:#fff;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.outer{background:var(--white);border:3px solid var(--purple);border-radius:24px;padding:40px 32px;width:100%;max-width:420px;text-align:center;box-shadow:0 8px 40px rgba(61,31,122,0.15);}
.logo-circle{width:120px;height:120px;background:#e8def8;border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;border:2px solid var(--light);}
.logo-circle img,.logo-emoji{font-size:64px;}
.logo-text{font-size:28px;font-weight:900;color:var(--purple);margin-bottom:4px;}
.subtitle{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;}
.field{margin-bottom:12px;text-align:left;}
.field input{width:100%;padding:12px 16px;border:1.5px solid var(--light);border-radius:10px;font-size:14px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--white);outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--purple);}
.field input::placeholder{color:var(--muted);}
.small-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:16px;}
.small-row a{color:var(--muted);text-decoration:none;cursor:pointer;}
.small-row a:hover{color:var(--purple);}
.btn{width:100%;background:var(--purple);color:var(--white);border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .15s;margin-bottom:12px;}
.btn:hover{background:var(--purple2);}
.btn-outline{background:transparent;border:2px solid var(--purple);color:var(--purple);}
.btn-outline:hover{background:var(--purple);color:var(--white);}
.err{color:var(--red);font-size:13px;font-weight:700;margin-bottom:10px;display:none;}
.back-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--purple);position:absolute;top:20px;left:20px;}
.page{display:none;}.page.active{display:block;}
.inner{background:var(--card);border-radius:18px;padding:28px 24px;position:relative;}
.page-title{font-size:18px;font-weight:800;margin-bottom:20px;}
.success-msg{font-size:16px;font-weight:700;color:var(--purple);margin:16px 0;}
</style>
</head>
<body>
<div class="outer">
  <!-- LOGIN PAGE -->
  <div class="page active" id="pg-login">
    <div class="inner">
      <div class="logo-circle"><img src="/static/images/fitai logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;" onerror="this.style.display='none';this.parentNode.innerHTML='🍎'"/></div>
      <div class="logo-text">FitAI</div>
      <div class="subtitle">AI-ASSISTED MEAL PLANNER</div>
      <div class="err" id="login-err"></div>
      <div class="field"><input id="login-user" type="text" placeholder="Username or Email"/></div>
      <div class="field"><input id="login-pass" type="password" placeholder="Password"/></div>
      <div class="small-row" style="justify-content:flex-end">
        <a onclick="show('pg-forgot')" style="display:none">Forgot Password</a>
        <a onclick="show('pg-signup')">Create Account</a>
      </div>
      <button class="btn" onclick="doLogin()">Login</button>
    </div>
  </div>

  <!-- SIGN UP PAGE -->
  <div class="page" id="pg-signup">
    <div class="inner">
      <button class="back-btn" onclick="show('pg-login')">←</button>
      <div class="logo-circle"><img src="/static/images/fitai logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;" onerror="this.style.display='none';this.parentNode.innerHTML='🍎'"/></div>
      <div class="page-title">Sign Up for an Account!</div>
      <div class="err" id="signup-err"></div>
      <div class="field"><input id="su-display" type="text" placeholder="Display Name"/></div>
      <div class="field"><input id="su-email" type="email" placeholder="Email Address"/></div>
      <div class="field"><input id="su-user" type="text" placeholder="Username"/></div>
      <div class="field"><input id="su-pass" type="password" placeholder="Password"/></div>
      <div class="field"><input id="su-confirm" type="password" placeholder="Confirm Password"/></div>
      <button class="btn" onclick="doSignup()">Sign Up</button>
    </div>
  </div>

  <!-- FORGOT PASSWORD PAGE -->
  <div class="page" id="pg-forgot">
    <div class="inner">
      <button class="back-btn" onclick="show('pg-login')">←</button>
      <div class="logo-circle"><img src="/static/images/fitai logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;" onerror="this.style.display='none';this.parentNode.innerHTML='🍎'"/></div>
      <div class="page-title" style="margin-top:16px">Password Recovery</div>
      <div class="err" id="forgot-err"></div>
      <div id="forgot-ok" style="display:none;color:#15803d;font-size:13px;font-weight:700;margin-bottom:10px"></div>
      <div class="field"><input id="forgot-email" type="email" placeholder="Recovery Email Address"/></div>
      <button class="btn" onclick="doForgot()">Send Recovery Link</button>
    </div>
  </div>

  <!-- LOGGED OUT PAGE -->
  <div class="page" id="pg-loggedout">
    <div class="inner">
      <div class="logo-circle"><img src="/static/images/fitai logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:50%;" onerror="this.style.display='none';this.parentNode.innerHTML='🍎'"/></div>
      <div class="success-msg">You've Successfully Logged Out!</div>
      <button class="btn" onclick="show('pg-login')">Return to Homepage</button>
    </div>
  </div>
</div>

<script>
const API='http://localhost:5000';
// Check if just logged out
if(new URLSearchParams(location.search).get('logout')==='1') show('pg-loggedout');

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  ['login-err','signup-err','forgot-err'].forEach(e=>{const el=document.getElementById(e);if(el)el.style.display='none';});
}

async function doLogin(){
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  // FTC11.4 / FTC11.5
  if(!user){err.textContent='No Username Entered.';err.style.display='block';return;}
  if(!pass){err.textContent='No Password Entered.';err.style.display='block';return;}
  try{
    const res=await fetch(API+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username:user,password:pass})});
    const data=await res.json();
    // FTC11.2 / FTC11.3
    if(!res.ok){err.textContent=data.error||'Invalid username or password.';err.style.display='block';return;}
    localStorage.setItem('fitai_user',JSON.stringify(data.user));
    window.location.href='dashboard.html';
  }catch(e){err.textContent='Could not reach server. Is app.py running?';err.style.display='block';}
}

async function doSignup(){
  const err=document.getElementById('signup-err');
  err.style.display='none';
  const display=document.getElementById('su-display').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const user=document.getElementById('su-user').value.trim();
  const pass=document.getElementById('su-pass').value;
  const confirm=document.getElementById('su-confirm').value;

  // Client-side validation (FTC12)
  if(!display){err.textContent='Enter a display name.';err.style.display='block';return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Invalid email address.';err.style.display='block';return;}
  if(!user){err.textContent='Username is required.';err.style.display='block';return;}
  if(!/^[a-zA-Z0-9]+$/.test(user)){err.textContent='Username must only consist of letters and numbers.';err.style.display='block';return;}
  if(!pass||pass.length<10||!/\d/.test(pass)){err.textContent='Password must be at least 10 characters & have at least one digit.';err.style.display='block';return;}
  if(pass!==confirm){err.textContent='Incorrect password confirmation.';err.style.display='block';return;}

  try{
    const res=await fetch(API+'/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({display_name:display,email,username:user,password:pass,confirm_password:confirm})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||'Sign up failed.';err.style.display='block';return;}
    localStorage.setItem('fitai_user',JSON.stringify(data.user));
    window.location.href='dashboard.html';
  }catch(e){err.textContent='Could not reach server. Is app.py running?';err.style.display='block';}
}

async function doForgot(){
  const email=document.getElementById('forgot-email').value.trim();
  const err=document.getElementById('forgot-err');
  const ok=document.getElementById('forgot-ok');
  if(!email){err.textContent='Please enter your email.';err.style.display='block';return;}
  // Simulated — in production connect to email service
  ok.textContent=`If ${email} is registered, a recovery link has been sent.`;
  ok.style.display='block';
  err.style.display='none';
}

// Enter key support
document.addEventListener('keydown',e=>{if(e.key==='Enter'){const pg=document.querySelector('.page.active');if(pg.id==='pg-login')doLogin();else if(pg.id==='pg-signup')doSignup();}});
</script>
</body>
</html>
